# Parachute vs ballistic descent (issue #6 demo).
# Same flight as config-ballistic.toml but WITH a parachute. Run both with run.sh.
[simulation]
dt			= 0.01
output.dt	= 0.1
output.dir	= "output"
timeout		= 400          # the chute descent takes minutes

[launcher]
length		= 5
elevation	= 89

[wind]
model		= "power"
ground.dir	= 90.0         # east
ground.speed= 4.0

[rocket]
name	= "parachute demo"
type	= "single"

[[rocket.stage]]
engine	= "../20191020_01.eng"   # fetched by examples/fetch-engine.sh
length	= 1.1540
diameter= 0.112
mass	= 5.035
I0		= 1.254
If		= 1.251
lcg0	= 0.913
lcgf	= 0.905
lcgp	= 1.076
lcp		= 1.141
Cd		= 0.440
Cna		= 7.840
# main chute at apogee: cd 1.5, 1.5 m canopy
parachute= {condition = "top", delay = 0.0, cd = 1.5, diameter = 1.5}
