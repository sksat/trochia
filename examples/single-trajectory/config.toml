# Single-trajectory example: one launch (elevation 85 deg, ground wind 3 m/s from -90 deg).
# Run from this directory:
#   ../fetch-engine.sh          # once, downloads ../20191020_01.eng
#   ../../build/bin/trochia      # reads ./config.toml, writes ./output/
#   gnuplot plot.gp              # -> trajectory.png

[simulation]
dt			= 0.01
output.dt	= 0.01
output.dir	= "output"

[launcher]
length		= 5
elevation	= 85

[wind]
model		= "power"
ground.dir	= -90.0
ground.speed= 3.0

[rocket]
name	= "example rocket"
type	= "hybrid"

[[rocket.stage]]
engine	= "../20191020_01.eng"   # fetched by examples/fetch-engine.sh
length	= 1.1540
diameter= 0.112
mass	= 5.035
I0		= 1.254
If		= 1.251
lcg0	= 0.913
lcgf	= 0.905
lcgp	= 1.076
lcp		= 1.141
Cd		= 0.440
Cna		= 7.840
parachute= {condition = "top", delay = 2.5}
